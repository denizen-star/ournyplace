[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  port = 8889
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/new"
  to = "/admin/new/index.html"
  status = 200

[[redirects]]
  from = "/admin/new/"
  to = "/admin/new/index.html"
  status = 200

[[redirects]]
  from = "/details/toured"
  to = "/details/toured/index.html"
  status = 200

[[redirects]]
  from = "/details/toured/"
  to = "/details/toured/index.html"
  status = 200

[[redirects]]
  from = "/instructions"
  to = "/instructions/index.html"
  status = 200

[[redirects]]
  from = "/instructions/"
  to = "/instructions/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
