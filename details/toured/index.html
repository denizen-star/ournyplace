<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937">
  <title>Toured checklist | nyhome</title>
  <link rel="icon" href="/assets/img/favicon1.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap">
  <link rel="stylesheet" href="/assets/css/app.css?v=140">
</head>
<body class="details-page toured-page">
  <header class="app-header">
    <div>
      <p class="eyebrow">nyhome</p>
      <h1>Toured checklist</h1>
    </div>
    <div class="app-header-actions">
      <a class="link-button" id="toured-back-link" href="/">Back to shortlist</a>
    </div>
  </header>

  <main class="page-shell">
    <section id="toured-root" aria-live="polite">
      <div class="empty-state">Loading…</div>
    </section>
  </main>

  <script src="/assets/js/apartmentStatus.js?v=140"></script>
  <script src="/assets/js/listingStar.js?v=140"></script>
  <script src="/assets/js/apartmentSavePayload.js?v=140"></script>
  <script src="/assets/js/nyhomeUiFeedback.js?v=140"></script>
  <script src="/assets/js/api.js?v=140"></script>
  <script src="/assets/js/toured.js?v=140"></script>
  <script>
  (function () {
    document.addEventListener('DOMContentLoaded', function () {
      var root = document.getElementById('toured-root');
      var backLink = document.getElementById('toured-back-link');
      var id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        root.innerHTML = '<div class="empty-state">No apartment selected. <a href="/">Back to shortlist</a></div>';
        return;
      }
      if (backLink) backLink.href = '/details/?id=' + encodeURIComponent(id);

      NyhomeAPI.getApartments()
        .then(function (data) {
          var apartment = (data.apartments || []).find(function (a) {
            return String(a.id) === String(id);
          });
          if (!apartment) {
            root.innerHTML = '<div class="empty-state">Apartment not found. <a href="/">Back to shortlist</a></div>';
            return;
          }
          root.innerHTML = '';
          NyhomeToured.mountToured(root, apartment, {
            saveApartment: NyhomeAPI.saveApartment,
          });
        })
        .catch(function () {
          root.innerHTML = '<div class="empty-state">Could not load apartment. <a href="/">Back to shortlist</a></div>';
        });
    });
  })();
  </script>
</body>
</html>
