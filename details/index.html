<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937">
  <title>Apartment details | nyhome</title>
  <link rel="icon" href="/assets/img/favicon1.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="details-page">
  <header class="app-header">
    <div>
      <p class="eyebrow">nyhome</p>
      <h1>Apartment details</h1>
    </div>
    <div class="app-header-actions">
      <a class="link-button" href="/admin/new">Add listing</a><span class="app-header-actions-sep" aria-hidden="true">|</span><a class="link-button" href="/">Back to shortlist</a>
    </div>
  </header>

  <main class="page-shell">
    <section id="detail-root" aria-live="polite">
      <div class="empty-state">Loading apartment details...</div>
    </section>
  </main>

  <dialog id="nyhome-blacklist-dialog" class="nyhome-modal">
    <div class="nyhome-modal-inner">
      <h2 class="nyhome-modal-title">Blacklisted building</h2>
      <p id="nyhome-blacklist-dialog-msg" class="nyhome-modal-msg muted"></p>
      <div class="nyhome-modal-actions">
        <button type="button" class="secondary-btn" id="nyhome-blacklist-cancel">Go back</button>
        <button type="button" class="primary-btn" id="nyhome-blacklist-confirm">Save anyway</button>
      </div>
    </div>
  </dialog>

  <script src="/assets/js/apartmentStatus.js?v=140"></script>
  <script src="/assets/js/listingStar.js?v=140"></script>
  <script src="/assets/js/apartmentSavePayload.js?v=140"></script>
  <script src="/assets/js/nyhomeUiFeedback.js?v=140"></script>

  <script src="/assets/js/saveApartmentWorkflow.js?v=140"></script>
  <script src="/assets/js/vibeImages.js?v=140"></script>
  <script src="/assets/js/toured.js?v=140"></script>
  <script src="/assets/js/details.js?v=140"></script>
