<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172033">
  <title>nyhome</title>
  <link rel="icon" href="/assets/img/favicon1.png" type="image/png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/app.css?v=41">
</head>
<body class="shortlist">
  <header class="app-header">
    <div>
      <p class="eyebrow">nyhome</p>
      <h1>Apartment shortlist</h1>
      <p class="shortlist-tagline">Scores, status, and next steps at a glance.</p>
      <div class="shortlist-sort" id="shortlist-sort" role="group" aria-label="Sort apartment cards">
        <span class="shortlist-sort-label" id="shortlist-sort-label">Sort by</span>
        <div class="shortlist-sort-segment" role="radiogroup" aria-labelledby="shortlist-sort-label">
          <button type="button" class="shortlist-sort-btn" role="radio" data-shortlist-sort="workflow" aria-checked="true">Workflow</button>
          <button type="button" class="shortlist-sort-btn" role="radio" data-shortlist-sort="avg" aria-checked="false">Avg</button>
          <button type="button" class="shortlist-sort-btn" role="radio" data-shortlist-sort="peter" aria-checked="false">Peter</button>
          <button type="button" class="shortlist-sort-btn" role="radio" data-shortlist-sort="kerv" aria-checked="false">Kerv</button>
          <button type="button" class="shortlist-sort-btn" role="radio" data-shortlist-sort="updated" aria-checked="false">Last updated</button>
        </div>
      </div>
    </div>
    <a class="link-button" href="/admin">Manage</a>
  </header>

  <main class="page-shell">
    <section id="status-filter"></section>
    <section class="summary-grid" id="summary-grid" aria-label="Apartment summary"></section>
    <section class="card-list" id="apartment-list" aria-live="polite">
      <div class="empty-state">Loading apartments...</div>
    </section>
  </main>

  <script src="/assets/js/apartmentStatus.js?v=41"></script>
  <script src="/assets/js/api.js?v=41"></script>
  <script src="/assets/js/app.js?v=41"></script>
  <script>
    (function () {
      var h = location.hostname;
      var isLocalDev = h === 'localhost' || h === '127.0.0.1' || h === '::1';
      if (!('serviceWorker' in navigator)) return;
      if (isLocalDev) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
        return;
      }
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    })();
  </script>
</body>
</html>
